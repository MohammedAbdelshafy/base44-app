version: "3.9"

# ============================================================
# CLIPPING FACTORY — LOCAL DEVELOPMENT DOCKER COMPOSE
# Run: docker compose up --build
# ============================================================

services:
  # ── Infrastructure ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clipuser
      POSTGRES_PASSWORD: clippass
      POSTGRES_DB: clipping_factory
      POSTGRES_MAX_CONNECTIONS: "25"
      PGOPTIONS: "-c statement_timeout=30000 -c idle_in_transaction_session_timeout=10000"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend ───────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /tmp/clips:/tmp/clips
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Workers ────────────────────────────────────────

  worker-campaigns:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - api
    volumes:
      - ./backend:/app
    command: >
      celery -A app.core.celery_app worker
      -Q campaigns,default
      -c 1
      -n worker-campaigns@%h
      --loglevel=INFO

  worker-video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - api
    volumes:
      - ./backend:/app
      - /tmp/clips:/tmp/clips
    command: >
      celery -A app.core.celery_app worker
      -Q acquisition,analysis,video
      -c 1
      -n worker-video@%h
      --loglevel=INFO

  worker-delivery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - api
    volumes:
      - ./backend:/app
    command: >
      celery -A app.core.celery_app worker
      -Q delivery,publish,health
      -c 1
      -n worker-delivery@%h
      --loglevel=INFO

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - api
    volumes:
      - ./backend:/app
    command: >
      celery -A app.core.celery_app beat
      --loglevel=INFO
      --scheduler celery.beat:PersistentScheduler

  # ── MCP Server (fastmcp — Claude Code / AI assistant integration) ────────
  # Connect from Claude Code: add to ~/.claude/settings.json → mcpServers
  #   "clipping-factory": { "type": "sse", "url": "http://localhost:8001/sse" }

  mcp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://clipuser:clippass@postgres:5432/clipping_factory
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.mcp_server --transport sse --port 8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Monitoring ────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ── Reverse proxy (optional for local dev) ────────────────

  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - api
  #     - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
