name: Scheduled Automations

on:
  schedule:
    # Hourly at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  run-automations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Run Hourly Emails
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        run: node server/emailSender.js --batchSize=21

      - name: Run Daily Leads Pipeline
        # We run the daily leads pipeline at 00:00 UTC (once a day)
        # However, since the cron is only '0 * * * *', this job triggers hourly.
        # So we check if the current hour is 0 (Midnight UTC) in bash.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" == "00" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Running daily leads pipeline..."
            node server/leadPipeline.js --all
          else
            echo "Skipping daily leads pipeline (runs at midnight UTC)"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Clipping Factory Campaign Seeder
        env:
          API_URL: ${{ secrets.CLIPPING_FACTORY_API_URL }}
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" == "00" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Running clipping factory seeder..."
            # Suppress errors if the API is unreachable
            python clipping-factory/seed_campaigns.py || echo "Clipping factory API unreachable, skipping."
          else
            echo "Skipping clipping factory (runs at midnight UTC)"
          fi
