# Hourly Email Queue Sender — runs on GitHub servers (OFFLINE-SAFE)
#
# This guarantees the queued emails are sent every hour even when your local
# machine is off. It runs the project's existing sender (server/emailSender.js)
# which drains all `qued` rows in email_queue via Gmail SMTP.
#
# Secrets required (set via `gh secret set`): see the env: block below.
# Trigger: every hour at :00 UTC, plus manual "Run workflow".

name: Email Queue Hourly

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-email-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      EMAIL_CONCURRENCY: "5"
      EMAIL_SEND_DELAY_MS: "100"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install sender dependencies
        run: npm install --no-save @supabase/supabase-js nodemailer dotenv

      - name: Send queued emails
        run: node server/emailSender.js
